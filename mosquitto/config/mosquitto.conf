# Mosquitto Configuration for codex-platform
# No authentication for now (local lab use only)
# TODO: Add auth before publishing configs to public GitHub

# Listener on default MQTT port
listener 1883
protocol mqtt

# Allow anonymous connections (lab environment)
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence (survive container restarts)
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
max_connections -1
max_queued_messages 10000
